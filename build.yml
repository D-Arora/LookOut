# Builds binaries for all platforms and uploads them as release assets.
# Trigger: push a git tag like v1.0.0
#   git tag v1.0.0 && git push origin v1.0.0

name: Build binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # also triggerable manually from the Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: outlook-calendar-sync-win-x64.exe
          - os: macos-latest       # ARM runner (M1)
            artifact: outlook-calendar-sync-macos-arm64
          - os: macos-13           # Intel runner
            artifact: outlook-calendar-sync-macos-x64
          - os: ubuntu-latest
            artifact: outlook-calendar-sync-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Build binary
        run: node build.mjs

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
