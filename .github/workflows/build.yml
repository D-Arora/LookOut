# Builds binaries for all platforms and uploads them as release assets.
# Trigger: push a git tag like v1.0.0
#   git tag v1.0.0 && git push origin v1.0.0

name: Build binaries

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # also triggerable manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: LookOut-win-x64.exe
          - os: macos-latest # ARM runner (M1)
            artifact: LookOut-macos-arm64
          # - os: macos-13 # Intel runner — disabled, runners unreliable
          #   artifact: LookOut-macos-x64
          - os: ubuntu-latest
            artifact: LookOut-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Build binary
        run: node build.mjs

      # ── macOS: zip with ditto before uploading ─────────────────────────────
      # Two reasons:
      # 1. actions/upload-artifact uses a plain zip which strips execute
      #    permissions — the .app won't open on Mac ("damaged and can't be opened").
      # 2. The recipient may be on Windows and needs a standard .zip they can
      #    extract with Explorer/7-Zip. We produce ONE ditto zip here and upload
      #    that file directly so upload-artifact doesn't re-wrap it.
      - name: Zip .app with ditto (macOS only)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/LookOut.app dist/LookOut-macos.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/LookOut-macos.zip # single file — upload-artifact won't re-zip it

      - name: Upload Windows / Linux artifact
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
